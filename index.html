<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ilyaster Donation</title>
    <style>
        /* --- ОСНОВНЫЕ СТИЛИ И ФОН --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('https://i.imgur.com/UQENXgI.png') no-repeat center center fixed;
            background-size: cover;
            user-select: none;
        }

        /* --- ЭФФЕКТ СТЕКЛА (WINDOWS AERO) --- */
        .aero-glass {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 
                inset 0 0 10px rgba(255, 255, 255, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.8),
                0 8px 20px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        /* --- ПАНЕЛЬ ЗАДАЧ --- */
        .taskbar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: linear-gradient(to bottom, rgba(160, 190, 230, 0.6) 0%, rgba(100, 140, 200, 0.6) 100%);
            border-top: 1px solid rgba(255, 255, 255, 0.6);
            display: flex;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* Кнопка Пуск (YouTube Ильястера) */
        .start-btn {
            width: 50px;
            height: 50px;
            margin-left: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }
        .start-btn:hover {
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.8)) brightness(1.2);
        }
        .start-btn:active {
            transform: scale(0.9);
        }
        .start-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* --- ОКНА --- */
        .window {
            position: absolute;
            width: 500px;
            height: 400px;
            border-radius: 8px 8px 0 0;
            display: flex;
            flex-direction: column;
            resize: both;
            overflow: hidden;
        }

        .title-bar {
            height: 30px;
            padding: 0 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: default;
            /* Полосато-стеклянный градиент шапки */
            background: linear-gradient(to bottom, rgba(255,255,255,0.8) 0%, rgba(200,220,240,0.5) 50%, rgba(150,180,220,0.5) 51%, rgba(200,220,240,0.5) 100%);
            border-bottom: 1px solid rgba(0, 0, 0, 0.2);
            text-shadow: 0 0 5px rgba(255,255,255,0.8), 0 0 10px rgba(255,255,255,0.8);
        }

        .title-text {
            font-size: 12px;
            color: #000;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .title-text img {
            width: 16px;
            height: 16px;
        }

        .window-controls {
            display: flex;
            gap: 2px;
        }

        .control-btn {
            width: 28px;
            height: 18px;
            border: 1px solid rgba(0,0,0,0.3);
            border-radius: 3px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.9), rgba(200,200,200,0.7));
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            cursor: pointer;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
        }

        .control-btn.close {
            background: linear-gradient(to bottom, #e08b8b, #c92f2f);
            color: white;
            border-color: #8b1a1a;
            box-shadow: inset 0 1px 0 rgba(255,180,180,0.8);
        }

        .control-btn:hover { filter: brightness(1.1); }
        .control-btn:active { filter: brightness(0.9); }

        .window-content {
            flex-grow: 1;
            background: #fff;
            border: 1px solid #777;
            margin: 0 5px 5px 5px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- БЛОКНОТ --- */
        #notepad { top: 50px; left: 100px; width: 450px; height: 350px; z-index: 10;}
        .menu-bar {
            background: #f0f0f0;
            border-bottom: 1px solid #ccc;
            padding: 2px 5px;
            font-size: 12px;
            display: flex;
            gap: 15px;
        }
        .menu-bar span { cursor: pointer; padding: 2px 4px; }
        .menu-bar span:hover { background: #cce8ff; border: 1px solid #99d1ff; border-radius: 2px; margin: -1px; }
        
        textarea.notepad-text {
            flex-grow: 1;
            border: none;
            resize: none;
            outline: none;
            padding: 5px;
            font-family: 'Lucida Console', Monaco, monospace;
            font-size: 14px;
            user-select: text;
        }

        /* --- ОКНО ДОНАТОВ --- */
        #donates { top: 150px; left: 600px; width: 600px; height: 500px; z-index: 11;}
        iframe.donate-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

    </style>
</head>
<body>

    <div class="window aero-glass" id="notepad">
        <div class="title-bar">
            <div class="title-text">
                <img src="https://win98icons.alexmeub.com/icons/png/notepad-0.png" alt="icon">
                Послание.txt - Блокнот
            </div>
            <div class="window-controls">
                <div class="control-btn">_</div>
                <div class="control-btn">□</div>
                <div class="control-btn close">X</div>
            </div>
        </div>
        <div class="window-content">
            <div class="menu-bar">
                <span>Файл</span><span>Правка</span><span>Формат</span><span>Вид</span><span>Справка</span>
            </div>
            <textarea class="notepad-text" spellcheck="false">
Приветствую тебя! 

Ты попал на официальный портал поддержки Ильястера. 
Спасибо, что ты здесь. Твоя поддержка помогает создавать новый, еще более крутой контент. 

Справа (или где-то на рабочем столе) открыто окно для донатов.
А если нажмешь на кнопку "Пуск" в левом нижнем углу — телепортируешься прямо на YouTube канал.

Да пребудет с нами сила!
            </textarea>
        </div>
    </div>

    <div class="window aero-glass" id="donates">
        <div class="title-bar">
            <div class="title-text">
                <img src="https://win98icons.alexmeub.com/icons/png/world-1.png" alt="icon">
                DonationAlerts
            </div>
            <div class="window-controls">
                <div class="control-btn">_</div>
                <div class="control-btn">□</div>
                <div class="control-btn close">X</div>
            </div>
        </div>
        <div class="window-content">
            <iframe class="donate-frame" src="https://www.donationalerts.com/r/ilayaster"></iframe>
        </div>
    </div>

    <div class="taskbar">
        <div class="start-btn" onclick="openYouTube()" title="Перейти на канал Великого Ильястера">
            <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="Start">
        </div>
    </div>

    <script>
        // --- ЛОГИКА ОТКРЫТИЯ YOUTUBE ---
        function openYouTube() {
            window.open('https://www.youtube.com/@ilayaster', '_blank');
        }

        // --- ЛОГИКА ПЕРЕТАСКИВАНИЯ ОКОН (Drag and Drop) И Z-INDEX ---
        let highestZ = 100;

        function makeDraggable(windowElement) {
            const titleBar = windowElement.querySelector('.title-bar');
            let isDragging = false;
            let offsetX = 0;
            let offsetY = 0;

            // При клике на окно делаем его активным (поверх остальных)
            windowElement.addEventListener('mousedown', () => {
                highestZ++;
                windowElement.style.zIndex = highestZ;
            });

            titleBar.addEventListener('mousedown', (e) => {
                isDragging = true;
                offsetX = e.clientX - windowElement.getBoundingClientRect().left;
                offsetY = e.clientY - windowElement.getBoundingClientRect().top;
                
                // Фикс бага с выделением текста при перетаскивании
                document.body.style.userSelect = 'none';
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                windowElement.style.left = (e.clientX - offsetX) + 'px';
                windowElement.style.top = (e.clientY - offsetY) + 'px';
            });

            document.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    document.body.style.userSelect = '';
                }
            });

            // Имитация работы кнопок (закрытие)
            const closeBtn = windowElement.querySelector('.close');
            closeBtn.addEventListener('click', () => {
                windowElement.style.display = 'none';
            });
        }

        // Инициализируем окна
        document.querySelectorAll('.window').forEach(win => {
            makeDraggable(win);
        });
    </script>
</body>
</html>
